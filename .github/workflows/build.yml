name: build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout (with Codec 2 submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build src/Codec2Player.csproj -c Release

      - name: Publish (self-contained x64)
        run: >
          dotnet publish src/Codec2Player.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true -o publish

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath Codec2Player-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codec2Player-win-x64
          path: Codec2Player-win-x64.zip

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Codec2Player-win-x64.zip
